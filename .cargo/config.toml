# Project-local cargo config.
#
# Cross-compiling to musl-static targets: rust's bundled lld
# (`rust-lld`, shipped inside the rustup toolchain) can link the
# fully-static musl targets without an external cross-gcc, so the only
# host prereq for `cargo build --target <triple>` is
# `rustup target add <triple>`.
#
# We intentionally do NOT set a linker for the host triples here —
# the user's ~/.cargo/config.toml already handles that.
[target.aarch64-unknown-linux-musl]
linker = "rust-lld"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
